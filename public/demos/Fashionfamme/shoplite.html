<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopLite</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:Arial; }
body { background:#f5f5f5; }

/* HEADER */
.header{
  background:#ff3b30;
  padding:15px;
  position:sticky;
  top:0;
  z-index:100;
}
.top-bar {
  display: flex;
  justify-content: space-between; /* 🔥 THIS is the fix */
  align-items: center;            /* optional but cleaner */
  font-size: 14px;
  color: white;
  margin-bottom: 10px;
}

.top-bar a{
  color:white;
  text-decoration:none;
  margin-left:10px;
}
.logo {
  font-weight: bold;
  font-size: 18px;
}

.search-box{
  background:white;
  padding:12px 15px;
  border-radius:30px;
}

.search-box input{
  border:none;
  outline:none;
  width:100%;
  font-size:16px;
}

/* Categories */
.categories{
  display:flex;
  gap:20px;
  overflow-x:auto;
  margin-top:12px;
}

.categories::-webkit-scrollbar{ display:none; }

.category-item{
  color:white;
  white-space:nowrap;
  font-size:14px;
  cursor:pointer;
  opacity:0.8;
}

.category-item.active{
  font-weight:bold;
  opacity:1;
  border-bottom:2px solid white;
}

/* HERO */
.hero{
  height:120px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-weight:bold;
  font-size:22px;
  background:linear-gradient(90deg,#ff3b30,#ff8c42);
}

/* DELIVERY */
.delivery{
  background:#fff8e1;
  padding:10px;
  display:flex;
  justify-content:space-between;
  font-size:14px;
}

/* PRODUCT GRID */
.products{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.product-card{
  background:white;
  border-radius:8px;
  padding:8px;
}

.product-card img{
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:6px;
}
  
  .product-link{
    text-decoration: none;
  }

.title{
  font-size:13px;
  margin:6px 0;
  height:34px;
  overflow:hidden;
}

.price{
  color:#ff3b30;
  font-weight:bold;
  font-size:14px;
}

.rating{
  font-size:12px;
  color:#777;
}
  
  .floating-cart {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: black;
  color: white;
  width: 55px;
  height: 55px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  text-decoration: none;
  box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
  z-index: 1000;
}

.floating-cart-count {
  position: absolute;
  top: -5px;
  right: -5px;
  background: red;
  color: white;
  font-size: 12px;
  padding: 2px 6px;
  border-radius: 50%;
  min-width: 18px;
  text-align: center;
  display: none;
}

/* Desktop */
@media(min-width:768px){
  .products{
    grid-template-columns:repeat(4,1fr);
  }
}
</style>
</head>
<body>

<div class="header">

<div class="top-bar">
  <div class="logo">ShopLite</div>
  <div id="userSection"></div>
</div>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search products...">
  </div>

  <div class="categories" id="categoryContainer"></div>

</div>
<a href="cart.html" class="floating-cart">
  🛒
  <span id="floatingCartCount" class="floating-cart-count">0</span>
</a>

<div class="hero">
  Mega Shopping Festival 🔥
</div>

<div class="delivery">
  <div>🚚 Free Shipping</div>
  <div>🔒 Secure Payment</div>
</div>

<div class="products" id="productContainer"></div>
<script src="js/data.js"></script>
<script src="js/cartUtils.js" defer></script>
<script src="js/cartBadge.js" defer></script>
<script src="js/login.js" defer></script>
<script type="module">


const productContainer = document.getElementById("productContainer");
const categoryContainer = document.getElementById("categoryContainer");
const searchInput = document.getElementById("searchInput");

let currentCategory = "all";

/* ========= RENDER PRODUCTS ========= */
function renderProducts(productList){
  productContainer.innerHTML = "";

  if(productList.length === 0){
    productContainer.innerHTML = "<p>No products found.</p>";
    return;
  }

  productList.forEach(product=>{
    const card = document.createElement("div");
    card.className = "product-card";

    card.innerHTML = `
    <a href="productDetail.html?id=${product.id}" class="product-link">
      <img src="${product.images[0]}" alt="${product.name}">
      <div class="title">${product.name}</div>
      <div class="price">$${product.price.toFixed(2)}</div>
      <div class="rating">⭐ ${product.rating} (${product.reviews})</div>
    </a>
    `;

    productContainer.appendChild(card);
  });
}

/* ========= GENERATE CATEGORIES ========= */
function generateCategories(){
  const categories = ["all", ...new Set(products.map(p=>p.category))];

  categories.forEach(cat=>{
    const div = document.createElement("div");
    div.className = "category-item";
    div.textContent = cat.toUpperCase();

    if(cat === "all") div.classList.add("active");

    div.addEventListener("click", ()=>{
      document.querySelectorAll(".category-item")
        .forEach(item=>item.classList.remove("active"));

      div.classList.add("active");
      currentCategory = cat;
      filterProducts();
    });

    categoryContainer.appendChild(div);
  });
}

/* ========= FILTER FUNCTION ========= */
function filterProducts(){
  let filtered = products;

  if(currentCategory !== "all"){
    filtered = filtered.filter(p=>p.category === currentCategory);
  }

  const searchValue = searchInput.value.toLowerCase();
  if(searchValue){
    filtered = filtered.filter(p =>
      p.name.toLowerCase().includes(searchValue)
    );
  }

  renderProducts(filtered);
}

/* ========= SEARCH ========= */
searchInput.addEventListener("input", filterProducts);

/* ========= INIT ========= */
generateCategories();
renderProducts(products);

</script>

</body>
</html>
