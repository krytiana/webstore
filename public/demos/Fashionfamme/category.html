<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Category - ShopLite</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#f2f2f2;}

/* HEADER */
.header{
  background:#6a1b9a;
  padding:12px;
  position:sticky;
  top:0;
  z-index:100;
}

.top-bar{
  display:flex;
  justify-content:flex-end;
  font-size:14px;
  color:white;
  margin-bottom:10px;
}

.top-bar a{
  color:white;
  text-decoration:none;
  margin-left:10px;
}

.search-box{
  background:white;
  padding:10px 15px;
  border-radius:30px;
}

.search-box input{
  border:none;
  outline:none;
  width:100%;
  font-size:15px;
}

/* PAGE TITLE */
.page-title{
  padding:15px;
  font-size:18px;
  font-weight:bold;
}

/* GRID */
.products-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

@media(min-width:768px){
  .products-grid{
    grid-template-columns:repeat(4,1fr);
  }
}

.product-card{
  background:white;
  border-radius:8px;
  padding:8px;
  position:relative;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.product-card img{
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:6px;
}

.discount-badge{
  position:absolute;
  top:6px;
  left:6px;
  background:#ff9800;
  color:white;
  font-size:11px;
  padding:3px 6px;
  border-radius:4px;
}

.title{
  font-size:13px;
  margin:6px 0;
  height:32px;
  overflow:hidden;
}

.price{
  color:#ff3b30;
  font-weight:bold;
  font-size:14px;
}

.rating{
  font-size:12px;
  color:#777;
}

.no-products{
  padding:20px;
  text-align:center;
}
</style>
</head>
<body>

<div class="header">
  <div class="top-bar">
    <div id="userSection"></div>
  </div>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search in category...">
  </div>
</div>

<div class="page-title" id="pageTitle"></div>

<div class="products-grid" id="productsGrid"></div>

<script src="js/data.js"></script>
<script src="js/logins.js" defer></script>

<script>

/* ===== GET CATEGORY FROM URL ===== */
const params = new URLSearchParams(window.location.search);
const category = params.get("cat");

const pageTitle = document.getElementById("pageTitle");
const productsGrid = document.getElementById("productsGrid");
const searchInput = document.getElementById("searchInput");

if(!category){
  pageTitle.textContent = "Category Not Found";
} else {
  pageTitle.textContent = category.toUpperCase();
  renderProducts();
}

/* ===== RENDER PRODUCTS ===== */
function renderProducts(searchValue=""){
  
  let filtered = products.filter(p => p.category === category);

  if(searchValue){
    filtered = filtered.filter(p =>
      p.name.toLowerCase().includes(searchValue.toLowerCase())
    );
  }

  if(filtered.length === 0){
    productsGrid.innerHTML = `
      <div class="no-products">No products found.</div>
    `;
    return;
  }

  productsGrid.innerHTML = filtered.map(product=>`
    <div class="product-card">
      ${product.discount ? `<div class="discount-badge">-${product.discount}%</div>`:""}
      <a href="productDetail.html?id=${product.id}" style="text-decoration:none;color:black;">
        <img src="${product.images[0]}" alt="${product.name}">
        <div class="title">${product.name}</div>
        <div class="price">GH₵ ${product.price.toFixed(2)}</div>
        <div class="rating">⭐ ${product.rating} (${product.reviews})</div>
      </a>
    </div>
  `).join("");
}

/* ===== SEARCH INSIDE CATEGORY ===== */
searchInput.addEventListener("input", function(){
  renderProducts(this.value.trim());
});

</script>

</body>
</html>
