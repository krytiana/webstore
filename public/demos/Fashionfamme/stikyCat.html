<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StikyCat</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,sans-serif;background:#f6f7fb;color:#111}
:root{--primary:#111827;--muted:#6b7280;--card:#fff;--radius:18px}

/* Header */
header{background:#fff;border-bottom:1px solid #eee;position:sticky;top:0;z-index:50}
.nav{max-width:1200px;margin:auto;padding:16px 24px;display:flex;justify-content:space-between;align-items:center}
.logo{font-weight:800;font-size:20px;display: block}
.nav-right{display:flex;gap:10px}
input{padding:10px 12px;border-radius:12px;border:1px solid #ddd}
button{border:none;border-radius:12px;padding:10px 14px;background:var(--primary);color:#fff;cursor:pointer}
button.outline{background:#fff;color:#111;border:1px solid #ddd}

/* Hero categories */
.hero-category{
  display:grid;
  grid-template-columns:2fr 3fr;
  gap:20px;
  align-items:center;
  margin:40px auto;
  max-width:1200px;
  padding:0 20px;
}
.hero-category img{
  width:100%;
  height:300px;
  object-fit:cover;
  border-radius:var(--radius);
  box-shadow:0 8px 20px rgba(0,0,0,.08)
}
.hero-category h2{font-size:28px;margin-bottom:10px}
.hero-category p{color:var(--muted);margin-bottom:12px}

/* Products */
.section-title{
  font-size:24px;
  font-weight:600;
  margin:20px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
  margin:0 20px 40px;
}
.card{
  background:#fff;
  border-radius:var(--radius);
  overflow:hidden;
  box-shadow:0 6px 18px rgba(0,0,0,.06);
  transition:.2s;
}
.card:hover{transform:translateY(-5px)}
.card img{width:100%;height:180px;object-fit:cover}
.card-body{padding:14px}
.price{font-size:14px;color:var(--muted);margin-top:4px}
.rating{font-size:13px;margin-top:4px}
.card-body button{width:100%;margin-top:10px}

/* Back button */
.back-btn{
  margin:20px;
  background:#fff;
  color:#111;
  border:1px solid #ddd;
}

/* Floating cart */
.floating-cart{
  position:fixed;
  bottom:20px;
  right:20px;
  background:black;
  color:white;
  width:55px;
  height:55px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  text-decoration:none;
  box-shadow:0 6px 20px rgba(0,0,0,.3);
  z-index:1000;
}
.floating-cart-count{
  position:absolute;
  top:-5px;
  right:-5px;
  background:red;
  color:white;
  font-size:12px;
  padding:2px 6px;
  border-radius:50%;
  min-width:18px;
  text-align:center;
  display:none;
}

/* Toast */
.toast{
  position:fixed;
  bottom:90px;
  right:20px;
  background:#111;
  color:#fff;
  padding:12px 16px;
  border-radius:12px;
  font-size:14px;
  opacity:0;
  transform:translateY(10px);
  transition:.3s ease;
  z-index:2000;
}
.toast.show{
  opacity:1;
  transform:translateY(0);
}

footer{background:#fff;border-top:1px solid #eee}
footer div{max-width:1200px;margin:auto;padding:20px;color:var(--muted)}

@media(max-width:900px){
  .hero-category{grid-template-columns:1fr}
  .grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:520px){
  .grid{grid-template-columns:1fr}
      .nav {
    flex-direction: column;
    align-items: stretch;
    gap: 12px;
  }

  .logo {
    text-align: center;
  }

  .nav-right {
    width: 100%;
    display: flex;
    gap: 10px;
  }

  .nav-right input {
    flex: 1;
  }

  .cart-icon {
    text-decoration: none;
  }
  
}
</style>
</head>
<body>

<header>
  <div class="nav">
    <div class="logo">StikyCat</div>
    <div class="nav-right">
      <input id="search" placeholder="Search…">
      <a href="dashboard.html"><button class="outline">🧑</button></a>
    </div>
  </div>
</header>

<!-- HERO CATEGORIES -->
<div id="categoriesTop">

  <section class="hero-category">
    <img src="images/dress1.jpg">
    <div>
      <h2>Dresses</h2>
      <p>Explore our stylish and modern dresses collection.</p>
      <button onclick="filterCategory('dress')">Shop Dresses</button>
    </div>
  </section>

  <section class="hero-category">
    <img src="images/shoe1.jpg">
    <div>
      <h2>Shoes</h2>
      <p>Comfortable and trendy shoes for every occasion.</p>
      <button onclick="filterCategory('shoe')">Shop Shoes</button>
    </div>
  </section>

  <section class="hero-category">
    <img src="images/bag1.jpg">
    <div>
      <h2>Accessories</h2>
      <p>Complete your outfit with elegant accessories.</p>
      <button onclick="filterCategory('accessories')">Shop Accessories</button>
    </div>
  </section>

</div>

<!-- PRODUCTS -->
<div id="productsSection">
  <button class="back-btn" onclick="scrollToCategories()">↑ Back to categories</button>
  <div class="section-title">Products</div>
  <div id="productGrid" class="grid"></div>
</div>

<a href="cart.html" class="floating-cart">
  🛒
  <span id="floatingCartCount" class="floating-cart-count">0</span>
</a>

<div id="toast" class="toast"></div>

<footer>
  <div>© 2026 StikyCat — Category Hero + Cart</div>
</footer>

<script src="js/data.js"></script>

<script>
/* ---------------- CART HELPERS ---------------- */
function getCart(){
  return JSON.parse(localStorage.getItem("cart")) || [];
}
function saveCart(cart){
  localStorage.setItem("cart", JSON.stringify(cart));
  updateCartBadge();
}
function updateCartBadge(){
  const cart=getCart();
  const total=cart.reduce((s,i)=>s+i.quantity,0);
  const badge=document.getElementById("floatingCartCount");
  badge.textContent=total;
  badge.style.display=total>0?"inline-block":"none";
}
document.addEventListener("DOMContentLoaded",updateCartBadge);

/* ---------------- TOAST ---------------- */
const toast=document.getElementById("toast");
let toastTimer;
function showToast(msg){
  toast.textContent=msg;
  toast.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>toast.classList.remove("show"),2000);
}

/* ---------------- PRODUCTS ---------------- */
const grid=document.getElementById("productGrid");
const search=document.getElementById("search");
const productsSection=document.getElementById("productsSection");
const categoriesTop=document.getElementById("categoriesTop");

let current="all";

function render(list){
  grid.innerHTML="";
  list.forEach(p=>{
    const card=document.createElement("div");
    card.className="card";
    card.innerHTML=`
      <img src="${p.images[0]}">
      <div class="card-body">
        <strong>${p.name}</strong>
        <div class="price">$${p.price}</div>
        <div class="rating">⭐ ${p.rating} (${p.reviews})</div>
        <button>Add to Cart</button>
      </div>
    `;
    card.querySelector("button").onclick=()=>addToCart(p);
    grid.appendChild(card);
  });
}

function apply(){
  const q=search.value.toLowerCase();
  let list=products.filter(p=>p.name.toLowerCase().includes(q));
  if(current!=="all") list=list.filter(p=>p.category===current);
  render(list);
}

function filterCategory(cat){
  current=cat;
  apply();
  productsSection.scrollIntoView({behavior:"smooth"});
}

function scrollToCategories(){
  categoriesTop.scrollIntoView({behavior:"smooth"});
}

function addToCart(product){
  const cart=getCart();
  const existing=cart.find(i=>i.id===product.id);

  if(existing){
    existing.quantity++;
    showToast("Quantity updated in cart");
  }else{
    cart.push({
      id:product.id,
      name:product.name,
      price:product.price,
      image:product.images[0],
      quantity:1
    });
    showToast("Added to cart");
  }
  saveCart(cart);
}

/* INIT */
render(products);
search.addEventListener("input",apply);
</script>

</body>
</html>
